<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes — CRUD Carros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">CRUD Carros</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto" id="nav-links"></ul>
            <div class="d-flex gap-2 me-3" id="nav-actions"></div>
            <form class="d-flex" id="form-busca">
                <input class="form-control me-2" type="search"
                       placeholder="Buscar carro..." id="input-busca">
                <button class="btn btn-outline-light" type="submit">Buscar</button>
            </form>
        </div>
    </div>
</nav>

<div class="container flex-grow-1 mt-4">

    <div id="msg-erro" class="alert alert-danger d-none">
        Carro não encontrado.
    </div>

    <div id="conteudo" class="card shadow-lg d-none">
        <div class="row g-0">

            <div class="col-md-5">
                <img id="carro-imagem" src="" alt="Foto do carro"
                     class="img-fluid rounded-start h-100" style="object-fit: cover;">
            </div>

            <div class="col-md-7">
                <div class="card-body">

                    <h2 id="carro-titulo" class="card-title mb-3"></h2>
                    <h4 id="carro-valor" class="text-success mb-4"></h4>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <p><strong>Ano:</strong> <span id="carro-ano"></span></p>
                            <p><strong>Cor:</strong> <span id="carro-cor"></span></p>
                            <p><strong>Transmissão:</strong> <span id="carro-transmissao"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Combustível:</strong> <span id="carro-combustivel"></span></p>
                            <p><strong>Km:</strong> <span id="carro-quilometragem"></span></p>
                            <p><strong>Avaliação:</strong> <span id="carro-avaliacao"></span></p>
                        </div>
                    </div>

                    <hr>

                    <p id="carro-descricao" class="card-text"></p>

                    <div class="mt-4 d-flex gap-2">
                        <a href="index.html" class="btn btn-secondary">Voltar</a>
                        <a id="btn-editar" href="#" class="btn btn-warning d-none">Editar</a>
                        <a id="btn-avaliar" href="#" class="btn btn-success d-none">Avaliar</a>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<footer class="bg-dark text-light mt-auto p-4">
    <div class="container">
        <h4>Sobre o projeto</h4>
        <p>
            Esse é um mini projeto desenvolvido para a disciplina de Desenvolvimento de Sistemas Web 1 (DSW 1).
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/detalhar.js"></script>

</body>
</html>
