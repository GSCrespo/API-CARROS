<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar Carro — CRUD Carros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">CRUD Carros</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto" id="nav-links"></ul>
            <div class="d-flex gap-2 me-3" id="nav-actions"></div>
            <form class="d-flex" id="form-busca">
                <input class="form-control me-2" type="search"
                       placeholder="Buscar carro..." id="input-busca">
                <button class="btn btn-outline-light" type="submit">Buscar</button>
            </form>
        </div>
    </div>
</nav>

<div class="container flex-grow-1 mt-4 d-flex justify-content-center">
    <div class="card shadow p-4" style="max-width: 450px; width: 100%;">

        <h2 class="mb-4">Avaliar Carro</h2>

        <!-- Erros -->
        <div id="erros" class="alert alert-danger d-none">
            <ul id="lista-erros" class="mb-0"></ul>
        </div>

        <!-- Sucesso -->
        <div id="sucesso" class="alert alert-success d-none"></div>

        <div class="mb-3">
            <label class="form-label">Nota (0 a 5)</label>
            <input type="number" id="avaliacao" step="0.1" min="0" max="5" class="form-control">
        </div>

        <button class="btn btn-primary" id="btn-avaliar">Avaliar</button>

    </div>
</div>

<footer class="bg-dark text-light mt-auto p-4">
    <div class="container">
        <h4>Sobre o projeto</h4>
        <p>Esse é um mini projeto desenvolvido para a disciplina de Desenvolvimento de Sistemas Web 1 (DSW 1).</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/avaliacao.js"></script>

</body>
</html>
